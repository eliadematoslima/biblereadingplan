<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    Plano de Leitura Bíblica
  </title>

  <link
    rel="stylesheet"
    href="css/style.css">
  <link rel="manifest" href="manifest.json">

</head>

<body>

  <header class="top-bar">
    <div class="top-actions">

      <button id="toggle-plan-btn">
        📘 Plano Tradicional
      </button>

      <div class="right-actions">

        <button id="theme-btn">
          🌙
        </button>

        <button id="reset-btn">
          🔄 Resetar
        </button>

      </div>

    </div>

    <div class="progress-container">

      <div class="progress-info">

        <span id="progress-text">
          0 / 365 dias concluídos
        </span>

        <span id="progress-percent">
          0%
        </span>

      </div>

      <div class="progress-bar-bg">

        <div
          id="progress-bar"
          class="progress-bar-fill">
        </div>

      </div>

    </div>
    
    <div class="title-area">

      <h1>
        Plano de Leitura Bíblica
      </h1>

      <div id="plan-meta">

        365 dias • 1189 capítulos

      </div>

    </div>

  </header>

  <div class="container">

    <div id="reading-list"></div>

  </div>

  <script
    type="module"
    src="js/app.js">
  </script>

</body>

</html>
