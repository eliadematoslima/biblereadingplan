<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador Plano Bíblico</title>
</head>
<body>

<h1>Gerando plano...</h1>

<pre id="output"></pre>

<script>

const bibleStructure = [
  ["Gênesis", 50],
  ["Êxodo", 40],
  ["Levítico", 27],
  ["Números", 36],
  ["Deuteronômio", 34],
  ["Josué", 24],
  ["Juízes", 21],
  ["Rute", 4],
  ["1 Samuel", 31],
  ["2 Samuel", 24],
  ["1 Reis", 22],
  ["2 Reis", 25],
  ["1 Crônicas", 29],
  ["2 Crônicas", 36],
  ["Esdras", 10],
  ["Neemias", 13],
  ["Ester", 10],
  ["Jó", 42],
  ["Salmos", 150],
  ["Provérbios", 31],
  ["Eclesiastes", 12],
  ["Cânticos", 8],
  ["Isaías", 66],
  ["Jeremias", 52],
  ["Lamentações", 5],
  ["Ezequiel", 48],
  ["Daniel", 12],
  ["Oséias", 14],
  ["Joel", 3],
  ["Amós", 9],
  ["Obadias", 1],
  ["Jonas", 4],
  ["Miquéias", 7],
  ["Naum", 3],
  ["Habacuque", 3],
  ["Sofonias", 3],
  ["Ageu", 2],
  ["Zacarias", 14],
  ["Malaquias", 4],
  ["Mateus", 28],
  ["Marcos", 16],
  ["Lucas", 24],
  ["João", 21],
  ["Atos", 28],
  ["Romanos", 16],
  ["1 Coríntios", 16],
  ["2 Coríntios", 13],
  ["Gálatas", 6],
  ["Efésios", 6],
  ["Filipenses", 4],
  ["Colossenses", 4],
  ["1 Tessalonicenses", 5],
  ["2 Tessalonicenses", 3],
  ["1 Timóteo", 6],
  ["2 Timóteo", 4],
  ["Tito", 3],
  ["Filemom", 1],
  ["Hebreus", 13],
  ["Tiago", 5],
  ["1 Pedro", 5],
  ["2 Pedro", 3],
  ["1 João", 5],
  ["2 João", 1],
  ["3 João", 1],
  ["Judas", 1],
  ["Apocalipse", 22]
];

const TOTAL_DAYS = 365;

const chapters = [];

for (const [book, total] of bibleStructure) {

  for (let chapter = 1; chapter <= total; chapter++) {

    chapters.push(`${book} ${chapter}`);

  }

}

const base = Math.floor(chapters.length / TOTAL_DAYS);

const extra = chapters.length % TOTAL_DAYS;

const plan = [];

let index = 0;

for (let day = 1; day <= TOTAL_DAYS; day++) {

  const amount =
    day <= extra
      ? base + 1
      : base;

  const readings =
    chapters.slice(index, index + amount);

  index += amount;

    function formatDate(dayNumber) {

    const date = new Date(2026, 0);

    date.setDate(dayNumber);

    const day =
        String(date.getDate()).padStart(2, "0");

    const month =
        String(date.getMonth() + 1).padStart(2, "0");

    return `${day}/${month}`;
    }

    function compactReadings(readings) {

    const grouped = [];

    let currentBook = "";
    let startChapter = null;
    let endChapter = null;

    readings.forEach((reading, index) => {

        const parts = reading.split(" ");

        const chapter =
        Number(parts.pop());

        const book =
        parts.join(" ");

        if (book !== currentBook) {

        if (currentBook !== "") {

            grouped.push(
            startChapter === endChapter
                ? `${currentBook} ${startChapter}`
                : `${currentBook} ${startChapter}-${endChapter}`
            );

        }

        currentBook = book;

        startChapter = chapter;

        endChapter = chapter;

        } else {

        endChapter = chapter;

        }

        if (index === readings.length - 1) {

        grouped.push(
            startChapter === endChapter
            ? `${currentBook} ${startChapter}`
            : `${currentBook} ${startChapter}-${endChapter}`
        );

        }

    });

    return grouped;

    }

    plan.push({

    day,

    date: formatDate(day),

    readings: compactReadings(readings)

    });


}

document.getElementById("output").textContent =
  JSON.stringify(plan, null, 2);

</script>

</body>
</html>
