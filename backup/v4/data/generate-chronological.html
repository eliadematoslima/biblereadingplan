function formatDate(dayNumber) {

  const date = new Date(2026, 0);

  date.setDate(dayNumber);

  const day =
    String(date.getDate())
      .padStart(2, "0");

  const month =
    String(date.getMonth() + 1)
      .padStart(2, "0");

  return `${day}/${month}`;

}
